
server {
    listen 80;
    server_name hackathonapi.cortextechnologies.net;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location /static/ {
        alias /home/ubuntu/cortex-codex-mock-preli/backend/staticfiles/;
        autoindex off;
        expires 1h;
        access_log off;
    }


    location / {
        proxy_pass http://127.0.0.1:38181;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # /sort-ticket is the slow one (normalizer round-trip); /health is fast.
        proxy_connect_timeout 30s;
        proxy_send_timeout    35s;
        proxy_read_timeout    35s;
    }
}